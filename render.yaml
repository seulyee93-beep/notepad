services:
  # Backend API (Web Service - Free)
  - type: web
    name: notepad-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: bash scripts/start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://notepad-app-tztd.onrender.com

  # Frontend (Static Site - Free)
  - type: web
    env: static
    name: notepad-app
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://notepad-api-tztd.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
