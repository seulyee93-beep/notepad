services:
  # Backend API (Web Service - Free)
  - type: worker
    name: notepad-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: notepad-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://notepad-app.onrender.com
      - key: TURSO_URL
      - key: TURSO_TOKEN
      - key: ADMIN
      - key: PW

  # Frontend (Static Site - Free)
  - type: static_site_site
    name: notepad-app
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://notepad-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # PostgreSQL (Free tier)
  - name: notepad-db
    plan: free
    databaseName: notepad
    user: notepad
