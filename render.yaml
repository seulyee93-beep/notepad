services:
  # Backend API (Web Service - Free)
  - type: web
    name: notepad-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./prod.db
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://notepad-app-y3m7.onrender.com

  # Frontend (Static Site - Free)
  - type: web
    env: static
    name: notepad-app
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://notepad-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
